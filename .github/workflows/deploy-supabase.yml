name: Deploy Supabase

# Migrations are applied manually via the Supabase dashboard SQL editor
# (outbound port 5432 is blocked from the dev machine, and CI's access token
# isn't authorized for the project). This workflow is therefore run-on-demand
# only — trigger it from the Actions tab when you want CI to push migrations.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-supabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Push database migrations
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required secrets
        shell: bash
        run: |
          missing=0
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not configured as a GitHub Actions secret."
              missing=1
            fi
          done
          exit "$missing"

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push migrations
        run: supabase db push
